name: Bug report
description: Report a reproducible problem with discovery, sending, receiving, or packaging
title: "[Bug]: "
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - Windows
        - Android
        - iOS
        - macOS
        - Browser compatibility mode
    validations:
      required: true
  - type: textarea
    id: network
    attributes:
      label: Network setup
      description: Same Wi-Fi, school/office network, VPN, firewall prompt, manual peer entry, or broadcast blocked.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start AirBridge on ...
        2. Send ...
        3. Receive ...
        4. See ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or release version
      description: Include app version or release asset when possible.