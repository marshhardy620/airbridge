name: Feature request
description: Suggest an improvement to AirBridge
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the transfer, discovery, packaging, or platform workflow pain point.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform affected
      multiple: true
      options:
        - Windows
        - Android
        - iOS
        - macOS
        - Shared protocol
        - Release packaging
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility notes
      description: Would this change UDP discovery, HTTP endpoints, ports, or cross-platform behavior?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered